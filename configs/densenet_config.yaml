data:
  dataset_handle: "samuelcortinhas/sports-balls-multiclass-image-classification"
  download_dir: "./data/raw_data"
  batch_size: 32
  num_workers: 4
  train_split_ratio: 0.8
  seed:42

model:
  name: "densenet"
  drop_rate: 0.2

train:
  epochs: 40
  learning_rate: 0.001
  device: "cuda"
  checkpoint_dir: "./checkpoints"